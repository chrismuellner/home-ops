---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: events
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: events
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: volsync
  interval: 10m
  path: ./kubernetes/apps/selfhosted/events/app
  postBuild:
    substitute:
      APP: events
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops
  wait: true
  targetNamespace: selfhosted
