---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homeassistant
spec:
  chartRef:
    kind: OCIRepository
    name: homeassistant
  interval: 30m
  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.3.4@sha256:916682086154a7390114a9788782b8efb199852d4f7d47066722c2bc5d1829e6

    service:
      main:
        ports:
          http:
            port: 8123

    route:
      main:
        hostnames:
          - "home.muellner.dev"
        parentRefs:
          - name: envoy-external
            namespace: network

    persistence:
      configuration-file:
        type: configMap
        name: homeassistant-config
        globalMounts:
          - path: /config/configuration.yaml
            subPath: configuration.yaml
      config:
        existingClaim: homeassistant-config
        globalMounts:
          - path: /config
      binary-sensor-file:
        type: configMap
        name: homeassistant-binary-sensor
        globalMounts:
          - path: /config/binary_sensor.yaml
            subPath: binary_sensor.yaml
      sensor-file:
        type: configMap
        name: homeassistant-sensor
        globalMounts:
          - path: /config/sensor.yaml
            subPath: sensor.yaml
      template-file:
        type: configMap
        name: homeassistant-template
        globalMounts:
          - path: /config/template.yaml
            subPath: template.yaml
