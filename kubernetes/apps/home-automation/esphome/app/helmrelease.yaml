---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
spec:
  chartRef:
    kind: OCIRepository
    name: esphome
  interval: 30m
  values:
    controllers:
      esphome:
        type: deployment
        containers:
          esphome:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2026.5.3
            env:
              ESPHOME_DASHBOARD_USE_PING: true # https://github.com/esphome/issues/issues/641#issuecomment-534156628
            securityContext:
              privileged: true

    service:
      esphome:
        ports:
          http:
            port: 6052

    route:
      esphome:
        hostnames:
          - "esphome.muellner.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: esphome
        globalMounts:
          - path: /config
