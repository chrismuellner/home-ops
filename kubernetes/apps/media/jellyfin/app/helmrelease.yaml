---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &release jellyfin
spec:
  releaseName: *release
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 30m
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: docker.io/jellyfin/jellyfin
              tag: 10.11.7
            resources:
              requests:
                cpu: 300m
                memory: 2Gi
              limits:
                memory: 8Gi

    service:
      app:
        ports:
          http:
            port: 8096
    
    route:
      app:
        hostnames:
          - "jellyfin.muellner.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: jellyfin-config
        globalMounts:
        - path: /config
      shows:
        existingClaim: pvc-shows
        globalMounts:
        - path: /data/media/shows
      movies:
        existingClaim: pvc-movies
        globalMounts:
        - path: /data/media/movies