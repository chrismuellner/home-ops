---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zfs-scrub
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: zfs-scrub
  dependsOn:
    - name: openebs
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: zfs-scrub
      namespace: system
  interval: 10m
  path: ./kubernetes/apps/system/zfs-scrub/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops
  wait: true
  targetNamespace: system
